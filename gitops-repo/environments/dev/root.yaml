---
apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: dev-root
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Debasish-87/enterprise-devsecops-platform.git
    targetRevision: HEAD
    path: gitops-repo

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
