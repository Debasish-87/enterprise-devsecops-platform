---
apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: kyverno-policies
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Debasish-87/enterprise-devsecops-platform.git
    targetRevision: HEAD
    path: gitops-repo/platform/kyverno/policies

  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
