---
apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: opentelemetry
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-collector
    targetRevision: 0.117.3

    helm:
      values: |
        mode: deployment

        config:
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: "0.0.0.0:4317"
                http:
                  endpoint: "0.0.0.0:4318"

          processors:
            batch:
              timeout: 10s
              send_batch_size: 1000

            memory_limiter:
              limit_mib: 256

          exporters:
            debug:
              verbosity: normal

            prometheus:
              endpoint: "0.0.0.0:8889"

          service:
            pipelines:
              traces:
                receivers: [otlp]
                processors: [memory_limiter, batch]
                exporters: [debug]

              metrics:
                receivers: [otlp]
                processors: [memory_limiter, batch]
                exporters: [prometheus]

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 512Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
