---
apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: karpenter
  namespace: argocd

spec:
  project: default

  source:
    repoURL: public.ecr.aws/karpenter
    chart: karpenter
    targetRevision: 1.3.2

    helm:
      values: |
        settings:
          clusterName: enterprise-devsecops-dev

        serviceAccount:
          annotations:
            eks.amazonaws.com/role-arn: arn:aws:iam::409837635702:role/karpenter-irsa-role

        controller:
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

        logLevel: info

  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
