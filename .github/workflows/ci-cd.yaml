name: CI/CD - Build, Scan & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'application/**'
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: rag-document-qa
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  # ─────────────────────────────────────────
  # STAGE 1: Lint & Static Analysis
  # ─────────────────────────────────────────
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Hadolint (Dockerfile Linter)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: application/Dockerfile
          failure-threshold: warning

      - name: Run Checkov (IaC Security Scan)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform-infra/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif

  # ─────────────────────────────────────────
  # STAGE 2: Build & Push to ECR
  # ─────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_uri: ${{ steps.meta.outputs.image_uri }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Clone RAG Application Source
        run: bash application/scripts/clone-rag.sh

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set Image Metadata
        id: meta
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./app-source
          file: ./app-source/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.image_uri }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy Image Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.image_uri }}
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-results.sarif

      - name: Push Docker Image to ECR
        run: docker push ${{ steps.meta.outputs.image_uri }}

  # ─────────────────────────────────────────
  # STAGE 3: Update GitOps Manifests
  # ─────────────────────────────────────────
  gitops-update:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_TOKEN }}
          fetch-depth: 0

      - name: Update Image Tag in Deployment Manifest
        run: |
          IMAGE_URI=${{ needs.build.outputs.image_uri }}
          sed -i "s|image:.*rag-document-qa:.*|          image: ${IMAGE_URI}|g" \
            gitops-repo/applications/rag-document-qa/deployment.yaml
          echo "Updated image to: ${IMAGE_URI}"

      - name: Commit & Push GitOps Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops-repo/applications/rag-document-qa/deployment.yaml
          git diff --staged --quiet || \
            git commit -m "chore: bump rag-document-qa image to ${{ needs.build.outputs.image_tag }} [skip ci]"
          git push

  # ─────────────────────────────────────────
  # STAGE 4: Deployment Summary
  # ─────────────────────────────────────────
  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [build, gitops-update]
    if: always()
    steps:
      - name: Write Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | \`${{ needs.build.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| GitOps Update | ${{ needs.gitops-update.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered By | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
