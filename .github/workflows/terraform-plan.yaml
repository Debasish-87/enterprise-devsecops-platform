name: Terraform Plan & Validate

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform-infra/**'
      - 'bootstrap/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: ap-south-1
  TF_VERSION: 1.9.0

jobs:
  terraform-validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Format Check
        working-directory: terraform-infra/environments/dev
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: terraform-infra/environments/dev
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform-infra/environments/dev
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform-infra/environments/dev
        id: plan
        run: terraform plan -no-color -input=false -var="aws_region=ap-south-1"
        continue-on-error: true

      - name: Comment PR with Plan
        uses: actions/github-script@v7
        with:
          script: |
            const plan = `${{ steps.plan.outputs.stdout }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`\n${plan.slice(0, 65000)}\n\`\`\``
            });
